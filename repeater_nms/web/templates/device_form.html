{% extends "base.html" %}

{% block content %}
  <section class="card">
    <h3 style="margin-top:0;">编辑设备</h3>
    <form method="post" class="form-grid">
      <label><div class="muted">设备名称</div><input type="text" name="name" value="{{ device.name }}" required></label>
      <label><div class="muted">IP</div><input type="text" name="ip" value="{{ device.ip }}" required></label>
      <label><div class="muted">SNMP 端口</div><input type="number" name="snmp_port" value="{{ device.snmp_port }}"></label>
      <label><div class="muted">Trap 端口</div><input type="number" name="trap_port" value="{{ device.trap_port }}"></label>
      <label>
        <div class="muted">SNMP 版本</div>
        <select name="snmp_version"><option value="v2c" {% if device.snmp_version == 'v2c' %}selected{% endif %}>v2c</option></select>
      </label>
      <label><div class="muted">Read Community（留空保持当前：{{ device.read_community|masked }}）</div><input type="text" name="read_community"></label>
      <label><div class="muted">Write Community（留空保持当前：{{ device.write_community|masked }}）</div><input type="text" name="write_community"></label>
      <label class="full"><div class="muted">备注</div><textarea name="notes">{{ device.notes or '' }}</textarea></label>
      <label class="full"><input type="checkbox" name="is_enabled" {% if device.is_enabled %}checked{% endif %}> 启用设备</label>
      <div class="full"><button type="submit">保存修改</button></div>
    </form>
  </section>
{% endblock %}
